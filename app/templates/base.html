<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}电气复习{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="icon" href="/static/favicon.svg">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">
            <span>⚡</span>
            <a href="/" style="color: inherit; text-decoration: none;">电气复习</a>
        </div>
        <div class="subject-selector">
            <select id="subjectSelector" aria-label="选择学科">
                <option value="">加载中...</option>
            </select>
        </div>
        <div class="navbar-links">
            <a href="/" class="nav-link">🏠 <span>首页</span></a>
            <a href="/exam" class="nav-link">📝 <span>学习</span></a>
            <a href="/wrong-book" class="nav-link">📚 <span>错题本</span></a>
            <a href="/subjects" class="nav-link">➕ <span>新增学科</span></a>
            <a href="/upload" class="nav-link">📤 <span>上传资料</span></a>
            <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">🌙</button>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer style="text-align: center; padding: 24px; color: var(--text-muted); font-size: 13px; border-top: 1px solid var(--border); margin-top: 48px;">
        <p>⚡ 电气专业课 AI 期末复习系统 © 2026</p>
    </footer>

    <script src="/static/js/subjects.js"></script>
    <script src="/static/js/app.js"></script>
    {% block extra_js %}{% endblock %}
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"
        onload="renderMathInElement(document.body,{delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false},{left:'\\(',right:'\\)',display:false},{left:'\\[',right:'\\]',display:true}],throwOnError:false})">
    </script>
</body>
</html>
