{% extends "base.html" %}

{% block title %}上传课件 - 电气复习{% endblock %}

{% block content %}
<div class="fade-in">
    <div style="margin-bottom: 20px;">
        <h1 style="font-size: 24px;">📤 上传课件</h1>
        <p style="color: var(--text-secondary); font-size: 14px;">上传 PDF 课件，AI 会自动学习教材内容，出题更贴近课堂</p>
    </div>

    <div class="card">
        <div class="card-header">
            <h3>选择 PDF 文件</h3>
        </div>
        <p style="color: var(--text-secondary); font-size: 14px; margin-bottom: 16px;">
            支持教材、讲义、习题集的 PDF 格式。
        </p>

        <div id="dropArea" style="
            border: 2px dashed var(--primary);
            border-radius: var(--radius-lg);
            padding: 48px 24px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            background: var(--primary-bg);
        " onclick="document.getElementById('fileInput').click()">
            <div style="font-size: 48px; margin-bottom: 12px;">📄</div>
            <p style="font-size: 16px; font-weight: 600;" id="uploadPrompt">点击选择 PDF 文件</p>
            <p style="font-size: 13px; color: var(--text-muted); margin-top: 8px;">或拖拽 PDF 到此处</p>
        </div>

        <input type="file" id="fileInput" accept=".pdf" style="display:none" onchange="handleFileSelect(event)">

        <div id="fileInfo" class="hidden card" style="margin-top: 16px;">
            <div class="flex-between">
                <div>
                    <p><strong id="fileName">-</strong></p>
                    <p style="font-size: 13px; color: var(--text-muted);" id="fileSize">-</p>
                </div>
                <button class="btn btn-primary" onclick="uploadFile()" id="uploadBtn">🚀 开始上传</button>
            </div>
        </div>

        <div id="uploadStatus" class="hidden mt-md"></div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    let selectedFile = null;

    function handleFileSelect(event) {
        const file = event.target.files[0];
        if (!file) return;
        selectedFile = file;
        document.getElementById("fileInfo").classList.remove("hidden");
        document.getElementById("fileName").textContent = file.name;
        document.getElementById("fileSize").textContent = (file.size / 1024 / 1024).toFixed(2) + " MB";
    }

    async function uploadFile() {
        if (!selectedFile) return;
        const formData = new FormData();
        formData.append("file", selectedFile);

        const btn = document.getElementById("uploadBtn");
        btn.disabled = true;
        btn.textContent = "⏳ 上传中...";

        const statusDiv = document.getElementById("uploadStatus");
        statusDiv.classList.remove("hidden");
        statusDiv.innerHTML = `<div class="flex-center" style="padding: 16px;"><div class="spinner"></div><span style="margin-left: 12px; color: var(--text-muted);">正在处理，请稍候...</span></div>`;

        try {
            const resp = await fetch("/api/knowledge/upload", { method: "POST", body: formData });
            const data = await resp.json();
            if (data.success) {
                statusDiv.className = "card";
                statusDiv.style.borderLeft = "4px solid var(--success)";
                statusDiv.innerHTML = `<div class="flex"><span style="font-size: 24px; margin-right: 12px;">✅</span><div><strong style="color: var(--success);">上传成功！</strong><p style="font-size: 14px; color: var(--text-secondary); margin-top: 4px;">${data.message || "课件已入库"}</p></div></div>`;
                showToast("课件上传成功！", "success");
            } else {
                statusDiv.className = "card";
                statusDiv.style.borderLeft = "4px solid var(--danger)";
                statusDiv.innerHTML = `<div class="flex"><span style="font-size: 24px; margin-right: 12px;">❌</span><div><strong style="color: var(--danger);">上传失败</strong><p style="font-size: 14px; color: var(--text-secondary); margin-top: 4px;">${data.error || "未知错误"}</p></div></div>`;
            }
        } catch (e) {
            statusDiv.className = "card";
            statusDiv.style.borderLeft = "4px solid var(--danger)";
            statusDiv.innerHTML = `<div class="flex"><span style="font-size: 24px; margin-right: 12px;">❌</span><div><strong style="color: var(--danger);">网络错误</strong><p style="font-size: 14px; color: var(--text-secondary); margin-top: 4px;">${e.message}</p></div></div>`;
        } finally {
            btn.disabled = false;
            btn.textContent = "🚀 开始上传";
        }
    }
</script>
{% endblock %}
