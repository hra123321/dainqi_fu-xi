<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上传课件 - 电气复习系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, "Microsoft YaHei", sans-serif; background: #f0f2f5; color: #333; }
        .header { background: #1a73e8; color: white; padding: 15px 0; text-align: center; }
        .header h1 { font-size: 22px; }
        .container { max-width: 800px; margin: 20px auto; padding: 0 20px; }
        .card { background: white; border-radius: 12px; padding: 25px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        .upload-area { border: 2px dashed #1a73e8; border-radius: 12px; padding: 40px; text-align: center; cursor: pointer; transition: background 0.2s; }
        .upload-area:hover { background: #f0f4ff; }
        .upload-area p { color: #666; margin-top: 10px; }
        .btn { background: #1a73e8; color: white; padding: 12px 24px; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; margin-top: 10px; }
        .btn:hover { background: #1557b0; }
        .btn:disabled { background: #999; cursor: not-allowed; }
        .status { margin-top: 15px; padding: 15px; border-radius: 8px; }
        .status.success { background: #e8f5e9; }
        .status.error { background: #ffebee; }
        .nav-link { display: inline-block; color: white; opacity: 0.9; text-decoration: none; margin: 0 15px; font-size: 14px; }
        .nav-link:hover { opacity: 1; text-decoration: underline; }
        .hidden { display: none; }
        .file-info { margin-top: 10px; padding: 10px; background: #f5f5f5; border-radius: 6px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>📤 上传课件</h1>
        <div style="margin-top: 8px;">
            <a href="/" class="nav-link">首页</a>
            <a href="/exam" class="nav-link">刷题</a>
            <a href="/upload" class="nav-link">上传课件</a>
        </div>
    </div>
    <div class="container">
        <div class="card">
            <h2>选择 PDF 课件</h2>
            <p style="color: #666; margin-bottom: 15px;">上传电气专业课的教材或课件 PDF，系统会自动提取文字并建立知识库。</p>
            <div class="upload-area" id="dropArea" onclick="document.getElementById('fileInput').click()">
                <p id="uploadPrompt">📄 点击此处选择 PDF 文件<br><span style="font-size: 13px; color: #999;">支持 .pdf 格式</span></p>
            </div>
            <input type="file" id="fileInput" accept=".pdf" style="display:none" onchange="handleFileSelect(event)">
            <div id="fileInfo" class="file-info hidden"></div>
            <button class="btn" id="uploadBtn" onclick="uploadFile()" disabled>开始上传</button>
            <div id="uploadStatus" class="hidden"></div>
        </div>

        <div class="card">
            <h2>📊 知识库状态</h2>
            <div id="kbStatus">
                <p>加载中...</p>
            </div>
        </div>
    </div>

    <script>
        let selectedFile = null;

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            selectedFile = file;
            document.getElementById("fileInfo").classList.remove("hidden");
            document.getElementById("fileInfo").innerHTML = `
                文件名: ${file.name}<br>
                大小: ${(file.size / 1024 / 1024).toFixed(2)} MB
            `;
            document.getElementById("uploadBtn").disabled = false;
        }

        async function uploadFile() {
            if (!selectedFile) return;
            const formData = new FormData();
            formData.append("file", selectedFile);

            document.getElementById("uploadBtn").disabled = true;
            document.getElementById("uploadBtn").textContent = "上传中...";
            const statusDiv = document.getElementById("uploadStatus");
            statusDiv.classList.remove("hidden");
            statusDiv.className = "status";
            statusDiv.textContent = "正在上传和处理，请稍候...";

            try {
                const resp = await fetch("/api/knowledge/upload", {
                    method: "POST",
                    body: formData,
                });
                const data = await resp.json();

                if (data.success) {
                    statusDiv.className = "status success";
                    statusDiv.innerHTML = `<strong>上传成功！</strong><br>${data.message}`;
                } else {
                    statusDiv.className = "status error";
                    statusDiv.innerHTML = `<strong>上传失败</strong><br>${data.error || "未知错误"}`;
                }
            } catch (e) {
                statusDiv.className = "status error";
                statusDiv.textContent = "上传出错: " + e.message;
            } finally {
                document.getElementById("uploadBtn").disabled = false;
                document.getElementById("uploadBtn").textContent = "开始上传";
                loadKbStatus();
            }
        }

        async function loadKbStatus() {
            try {
                const resp = await fetch("/api/knowledge/collections");
                const data = await resp.json();
                const container = document.getElementById("kbStatus");
                if (data.collections && data.collections.length > 0) {
                    container.innerHTML = data.collections.map(c =>
                        `<p>📁 ${c.name}: <strong>${c.doc_count}</strong> 篇文档</p>`
                    ).join("");
                } else {
                    container.innerHTML = "<p>无法获取知识库状态</p>";
                }
            } catch (e) {
                document.getElementById("kbStatus").innerHTML = `<p>加载失败: ${e.message}</p>`;
            }
        }

        loadKbStatus();
    </script>
</body>
</html>
