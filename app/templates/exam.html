{% extends "base.html" %}

{% block title %}学习 - 电气复习{% endblock %}

{% block content %}
<div class="fade-in">
    <div style="margin-bottom: 20px;">
        <h1 style="font-size: 24px;">📚 知识点大全</h1>
        <p style="color: var(--text-secondary); font-size: 14px;">浏览全部知识点 · 星级标注难度与重要性 · 视频讲解 · AI解析 · 刷题巩固</p>
    </div>

    <!-- 搜索 + 筛选栏 -->
    <div class="card" style="margin-bottom: 16px;">
        <div class="flex-between" style="flex-wrap: wrap; gap: 12px;">
            <div style="flex: 1; min-width: 200px;">
                <input type="text" id="topicSearch" class="form-control" placeholder="🔍 搜索知识点..." oninput="filterTopics()" style="padding-left: 36px;">
            </div>
            <div class="flex gap-sm" style="flex-wrap: wrap;">
                <select id="sortBy" class="form-control" style="width: auto;" onchange="filterTopics()">
                    <option value="default">默认排序</option>
                    <option value="difficulty">按难度 ↓</option>
                    <option value="examImportance">按考试重要性 ↓</option>
                    <option value="engineeringImportance">按工程重要性 ↓</option>
                    <option value="name">按名称排序</option>
                </select>
                <a id="courseLinkBtn" href="#" target="_blank" class="btn btn-outline btn-sm" style="display: none;">📺 全套课程</a>
            </div>
        </div>
        <div style="margin-top: 8px; display: flex; gap: 16px; flex-wrap: wrap; align-items: center;">
            <span style="font-size: 13px; color: var(--text-muted);">
                当前：<strong id="currentSubjectName">-</strong>
            </span>
            <span style="font-size: 13px; color: var(--text-muted);" id="topicCount"></span>
            <!-- 星级图例 -->
            <span style="font-size: 12px; display: flex; gap: 12px; flex-wrap: wrap;">
                <span style="color: #dc2626;">★ 极重要</span>
                <span style="color: #d97706;">★ 重要</span>
                <span style="color: #2563eb;">★ 中等</span>
                <span style="color: #16a34a;">★ 一般</span>
                <span style="color: #94a3b8;">★ 基础</span>
            </span>
        </div>
    </div>

    <!-- 知识点列表 -->
    <div id="topicList" class="fade-in"></div>

    <!-- 讲解弹出区 -->
    <div id="explainArea" class="hidden">
        <div class="card">
            <div class="card-header">
                <h3 id="explainTitle">📖 知识点讲解</h3>
                <button class="btn btn-sm btn-outline" onclick="closeExplain()">✕ 关闭</button>
            </div>
            <div id="explainContent" style="font-size: 15px; line-height: 1.8; white-space: pre-wrap;">
                <div class="flex-center" style="padding: 40px;">
                    <div class="spinner"></div>
                    <span style="margin-left: 12px; color: var(--text-muted);">AI 正在生成讲解...</span>
                </div>
            </div>
            <div style="margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); display: flex; gap: 12px; flex-wrap: wrap;">
                <button class="btn btn-primary" id="explainPracticeBtn" onclick="startPracticeFromExplain()">📝 针对这个知识点出题</button>
                <a id="explainVideoLink" href="#" target="_blank" class="btn btn-outline">📺 B站搜讲解视频</a>
            </div>
        </div>
    </div>

    <!-- 出题区 -->
    <div id="practiceArea" class="hidden">
        <div class="card">
            <div class="card-header">
                <h3 id="practiceTitle">📝 刷题</h3>
                <button class="btn btn-sm btn-outline" onclick="closePractice()">✕ 关闭</button>
            </div>
            <div id="practiceContent">
                <div class="form-group">
                    <label>📊 难度</label>
                    <select id="practiceDifficulty" class="form-control">
                        <option value="easy">简单 — 概念题</option>
                        <option value="normal" selected>中等 — 一般计算</option>
                        <option value="hard">困难 — 复杂推导</option>
                        <option value="expert">专家 — 综合应用</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>📄 数量</label>
                    <input type="number" id="practiceCount" class="form-control" value="3" min="1" max="10" style="max-width: 120px;">
                </div>
                <button class="btn btn-primary" onclick="generatePracticeQuestions()" id="practiceGenBtn">🚀 开始出题</button>
            </div>
        </div>
        <div id="practiceQuestions" class="hidden">
            <div class="card"><div id="practiceQuestionsList"></div></div>
            <div style="text-align: center; margin-bottom: 16px;">
                <button class="btn btn-success" onclick="submitPracticeAnswers()" id="practiceSubmitBtn">📤 提交全部答案</button>
            </div>
        </div>
        <div id="practiceResults" class="hidden">
            <div class="card">
                <div class="card-header"><h3>📊 批改结果</h3></div>
                <div id="practiceResultsList"></div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    let currentTopic = "";
    let currentSubject = "";
    let currentQuestions = [];
    let searchTimer = null;

    // 渲染知识点列表（含星级）
    function renderTopics(topics, subject) {
        const container = document.getElementById("topicList");
        if (!topics || topics.length === 0) {
            container.innerHTML = `<div style="text-align: center; padding: 48px; color: var(--text-muted);"><div style="font-size: 48px; margin-bottom: 12px;">🔍</div><p>没有找到匹配的知识点</p></div>`;
            return;
        }
        container.innerHTML = topics.map((t, i) => {
            const name = t.name || t;
            const diff = t.difficulty || 0;
            const exam = t.examImportance || 0;
            const eng = t.engineeringImportance || 0;
            return `
            <div class="card topic-card" style="cursor: pointer; padding: 14px 16px; animation: fadeIn 0.3s ease ${Math.min(i * 0.02, 1)}s both;"
                 onclick="showExplain('${name.replace(/'/g, "\\\\'").replace(/"/g, "&quot;")}')">
                <div class="flex-between" style="flex-wrap: wrap; gap: 8px;">
                    <div style="flex: 1; min-width: 200px;">
                        <div style="font-size: 14px; font-weight: 500; margin-bottom: 4px;">
                            <span style="color: var(--text-muted); font-size: 12px;">${i + 1}.</span> ${name}
                        </div>
                        <div style="display: flex; gap: 12px; font-size: 12px; flex-wrap: wrap;">
                            <span title="难度">📊 难度 <span style="color: ${getStarColor(diff)};">${renderStars(diff)}</span></span>
                            <span title="考试重要性">📝 考试 <span style="color: ${getStarColor(exam)};">${renderStars(exam)}</span></span>
                            <span title="工程重要性">🔧 工程 <span style="color: ${getStarColor(eng)};">${renderStars(eng)}</span></span>
                        </div>
                    </div>
                    <div class="flex gap-sm" style="flex-shrink: 0;">
                        <button class="btn btn-sm btn-outline" onclick="event.stopPropagation(); window.open(getBilibiliSearchUrl('${name.replace(/'/g, "\\\\'")}', '${subject.name.replace(/'/g, "\\\\'")}'), '_blank')" title="B站搜讲解视频">📺</button>
                        <button class="btn btn-sm btn-primary" onclick="event.stopPropagation(); showExplain('${name.replace(/'/g, "\\\\'").replace(/"/g, "&quot;")}')">📖</button>
                        <button class="btn btn-sm btn-success" onclick="event.stopPropagation(); startPractice('${name.replace(/'/g, "\\\\'").replace(/"/g, "&quot;")}')">📝</button>
                    </div>
                </div>
            </div>`;
        }).join("");
    }

    // 搜索+筛选+排序
    function filterTopics() {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => {
            const query = document.getElementById("topicSearch").value.trim();
            const sort = document.getElementById("sortBy").value;
            const subject = getDefaultSubject();
            let results = searchTopics(subject.id, query);

            // 排序
            if (sort === "name") {
                results = [...results].sort((a, b) => (a.name || a).localeCompare(b.name || b));
            } else if (sort === "difficulty") {
                results = [...results].sort((a, b) => (b.difficulty || 0) - (a.difficulty || 0));
            } else if (sort === "examImportance") {
                results = [...results].sort((a, b) => (b.examImportance || 0) - (a.examImportance || 0));
            } else if (sort === "engineeringImportance") {
                results = [...results].sort((a, b) => (b.engineeringImportance || 0) - (a.engineeringImportance || 0));
            }

            renderTopics(results, subject);
            document.getElementById("topicCount").textContent =
                `共 ${subject.topics.length} 个知识点，显示 ${results.length} 个`;
        }, 150);
    }

    // 初始化
    function initTopicBrowser() {
        const subject = getDefaultSubject();
        currentSubject = subject.name;
        document.getElementById("currentSubjectName").textContent = subject.icon + " " + subject.name;
        document.getElementById("topicCount").textContent = `共 ${subject.topics.length} 个知识点`;

        const courseBtn = document.getElementById("courseLinkBtn");
        if (subject.courseLink) {
            courseBtn.href = subject.courseLink;
            courseBtn.style.display = "inline-flex";
            courseBtn.textContent = "📺 " + subject.courseName;
        } else {
            courseBtn.style.display = "none";
        }
        renderTopics(subject.topics, subject);
    }

    document.addEventListener("subjectChanged", (e) => {
        document.getElementById("topicSearch").value = "";
        document.getElementById("explainArea").classList.add("hidden");
        document.getElementById("practiceArea").classList.add("hidden");
        initTopicBrowser();
    });

    // ====== 讲解 ======
    let explainingTopic = "";
    async function showExplain(topic) {
        explainingTopic = topic; currentTopic = topic;
        document.getElementById("explainArea").classList.remove("hidden");
        document.getElementById("explainTitle").textContent = "📖 " + topic;
        document.getElementById("explainContent").innerHTML = `<div class="flex-center" style="padding: 40px;"><div class="spinner"></div><span style="margin-left: 12px; color: var(--text-muted);">AI 正在生成讲解...</span></div>`;
        const subject = getDefaultSubject();
        document.getElementById("explainVideoLink").href = getBilibiliSearchUrl(topic, subject.name);
        document.getElementById("explainArea").scrollIntoView({ behavior: "smooth" });
        try {
            const resp = await fetch("/api/exam/explain", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ topic, subject: subject.name }) });
            const data = await resp.json();
            let html = data.explanation || "暂无讲解内容";
            html = html.replace(/^### (.+)$/gm, "<h4 style='margin-top:16px;margin-bottom:8px;'>$1</h4>");
            html = html.replace(/^## (.+)$/gm, "<h3 style='margin-top:20px;margin-bottom:8px;'>$1</h3>");
            html = html.replace(/^# (.+)$/gm, "<h2 style='margin-top:24px;margin-bottom:12px;'>$1</h2>");
            html = html.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
            html = html.replace(/\n/g, "<br>");
            document.getElementById("explainContent").innerHTML = html;
            showToast("讲解已生成", "success");
        } catch(e) {
            document.getElementById("explainContent").innerHTML = `<p style="color:var(--danger);">生成失败: ${e.message}</p>`;
        }
    }
    function closeExplain() { document.getElementById("explainArea").classList.add("hidden"); }
    function startPracticeFromExplain() { closeExplain(); startPractice(explainingTopic); }

    // ====== 刷题 ======
    function startPractice(topic) {
        currentTopic = topic;
        document.getElementById("practiceArea").classList.remove("hidden");
        document.getElementById("practiceTitle").textContent = "📝 " + topic;
        document.getElementById("practiceContent").classList.remove("hidden");
        document.getElementById("practiceQuestions").classList.add("hidden");
        document.getElementById("practiceResults").classList.add("hidden");
        document.getElementById("practiceArea").scrollIntoView({ behavior: "smooth" });
    }
    function closePractice() { document.getElementById("practiceArea").classList.add("hidden"); }

    async function generatePracticeQuestions() {
        const difficulty = document.getElementById("practiceDifficulty").value;
        const count = parseInt(document.getElementById("practiceCount").value);
        document.getElementById("practiceGenBtn").disabled = true;
        document.getElementById("practiceContent").innerHTML = `<div class="flex-center" style="padding:24px;"><div class="spinner"></div><span style="margin-left:12px;color:var(--text-muted);">正在出题...</span></div>`;
        try {
            const resp = await fetch("/api/exam/generate", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ knowledge_point: currentTopic, difficulty, count, subject: localStorage.getItem("selectedSubject") || "" }) });
            const data = await resp.json();
            if (data.questions && data.questions.length > 0) {
                currentQuestions = data.questions;
                document.getElementById("practiceQuestionsList").innerHTML = data.questions.map((q, i) => `
                    <div style="border-left:4px solid var(--primary);padding:16px;margin:12px 0;background:var(--primary-bg);border-radius:0 var(--radius-sm) var(--radius-sm) 0;">
                        <div class="flex-between mb-sm"><strong>第${i+1}题</strong><span style="font-size:12px;color:var(--text-muted);">${q.type==="objective"?"客观题":"主观题"}</span></div>
                        <p style="white-space:pre-wrap;margin-bottom:12px;">${q.question_text}</p>
                        <textarea id="panswer_${q.id}" class="form-control" placeholder="输入你的答案..." style="min-height:60px;"></textarea>
                    </div>`).join("");
                document.getElementById("practiceContent").classList.add("hidden");
                document.getElementById("practiceQuestions").classList.remove("hidden");
                document.getElementById("practiceQuestions").scrollIntoView({ behavior: "smooth" });
                showToast("生成了 " + data.questions.length + " 道题", "success");
            } else { showToast("出题失败", "error"); }
        } catch(e) { showToast("请求失败: " + e.message, "error"); }
        document.getElementById("practiceGenBtn").disabled = false;
    }

    async function submitPracticeAnswers() {
        const results = [];
        for (const q of currentQuestions) {
            const answer = document.getElementById("panswer_" + q.id).value.trim();
            if (!answer) { showToast("请回答所有题目", "warning"); return; }
            results.push({ question_id: q.id, question_type: q.type, question: q.question_text, student_answer: answer });
        }
        document.getElementById("practiceSubmitBtn").disabled = true;
        document.getElementById("practiceResultsList").innerHTML = "";
        for (const r of results) {
            try {
                const resp = await fetch("/api/exam/submit", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(r) });
                const data = await resp.json();
                const isWrong = data.conclusion === "错误" || data.conclusion === "wrong";
                const div = document.createElement("div");
                div.style.cssText = `margin-bottom:12px;padding:16px;border-radius:var(--radius-sm);border-left:4px solid ${isWrong?"var(--danger)":"var(--success)"};background:${isWrong?"var(--danger-bg)":"var(--success-bg)"};`;
                div.innerHTML = `<div class="flex-between mb-sm"><strong>${isWrong?"❌ 错误":"✅ 正确"}</strong></div><div style="font-size:14px;white-space:pre-wrap;">${data.analysis||"无分析"}</div>`;
                document.getElementById("practiceResultsList").appendChild(div);
            } catch(e) {
                document.getElementById("practiceResultsList").innerHTML += `<div style="padding:12px;border-left:4px solid var(--danger);">提交失败: ${e.message}</div>`;
            }
        }
        document.getElementById("practiceResults").classList.remove("hidden");
        document.getElementById("practiceResults").scrollIntoView({ behavior: "smooth" });
        document.getElementById("practiceSubmitBtn").disabled = false;
    }

    document.addEventListener("DOMContentLoaded", initTopicBrowser);
</script>
{% endblock %}
